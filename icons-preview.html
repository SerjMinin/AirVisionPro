<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<title>Выбор иконок — AirVision Pro</title>
<style>
  body { margin:0; font-family:'Exo 2',sans-serif; background:radial-gradient(ellipse at center,#0a2540,#02040a); color:#eaf4ff; padding:40px; }
  h1 { font-weight:600; color:#4db2ff; }
  .row { display:flex; align-items:center; gap:40px; padding:24px; margin:16px 0; border:1px solid rgba(120,190,255,0.25); border-radius:16px; background:rgba(255,255,255,0.04); }
  .row h2 { width:120px; margin:0; font-size:18px; color:#4db2ff; }
  .ico { color:#4db2ff; filter:drop-shadow(0 0 6px rgba(41,155,255,0.5)); }
  .name { font-size:12px; color:rgba(200,225,255,0.6); text-align:center; margin-top:6px; }
  .cell { text-align:center; }
</style>
</head>
<body>
  <h1>Выберите набор иконок (Вариант 1 / 2 / 3)</h1>
  <p>Иконки: 🌓 тема · 🌐 язык · ⚙ настройки · ⎋ выход</p>

  <!-- ВАРИАНТ 1 — тонкие линии (line) -->
  <div class="row">
    <h2>Вариант 1<br>Тонкие линии</h2>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"/></svg><div class="name">тема</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/></svg><div class="name">язык</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1l-.4-2.5h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5 2 1.5a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/></svg><div class="name">настройки</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg><div class="name">выход</div></div>
  </div>

  <!-- ВАРИАНТ 2 — толще, скруглённые (bold rounded) -->
  <div class="row">
    <h2>Вариант 2<br>Жирные скруглённые</h2>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"/></svg><div class="name">тема</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M3 12h18M12 3c2.5 3 2.5 15 0 18M12 3c-2.5 3-2.5 15 0 18"/></svg><div class="name">язык</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 13a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V19a2 2 0 1 1-4 0v-.1A1.6 1.6 0 0 0 7 17.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.6 1.6 0 0 0-1.1-2.7H3a2 2 0 1 1 0-4h.1A1.6 1.6 0 0 0 4.7 7l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.6 1.6 0 0 0 1.8.3H10a2 2 0 1 1 4 0 1.6 1.6 0 0 0 2.7 1.1l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0-.3 1.8z"/></svg><div class="name">настройки</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg><div class="name">выход</div></div>
  </div>

  <!-- ВАРИАНТ 3 — заливка (filled glow) -->
  <div class="row">
    <h2>Вариант 3<br>Залитые</h2>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3a9 9 0 1 0 9 9 7 7 0 0 1-9-9z"/></svg><div class="name">тема</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2a10 10 0 1 0 10 10A10 10 0 0 0 12 2zm6.9 9h-3a15 15 0 0 0-1-5 8 8 0 0 1 4 5zM12 4c.9 1.2 1.7 3.3 1.9 7h-3.8C10.3 7.3 11.1 5.2 12 4zM4.1 11a8 8 0 0 1 4-5 15 15 0 0 0-1 5zm0 2h3a15 15 0 0 0 1 5 8 8 0 0 1-4-5zm7.9 7c-.9-1.2-1.7-3.3-1.9-7h3.8c-.2 3.7-1 5.8-1.9 7zm2.9-2a15 15 0 0 0 1-5h3a8 8 0 0 1-4 5z"/></svg><div class="name">язык</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M12 8a4 4 0 1 0 4 4 4 4 0 0 0-4-4zm9.4 4a7.5 7.5 0 0 0-.1-1.3l2-1.6-2-3.4-2.4 1a7.3 7.3 0 0 0-2.2-1.3L16.3 2h-4l-.4 2.7a7.3 7.3 0 0 0-2.2 1.3l-2.4-1-2 3.4 2 1.6a7.4 7.4 0 0 0 0 2.6l-2 1.6 2 3.4 2.4-1a7.3 7.3 0 0 0 2.2 1.3l.4 2.7h4l.4-2.7a7.3 7.3 0 0 0 2.2-1.3l2.4 1 2-3.4-2-1.6a7.5 7.5 0 0 0 .1-1.3z"/></svg><div class="name">настройки</div></div>
    <div class="cell"><svg class="ico" width="34" height="34" viewBox="0 0 24 24" fill="currentColor"><path d="M10 3H6a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h4v-2H6a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h4zm6.7 5.3-1.4 1.4L17.6 12H9v2h8.6l-2.3 2.3 1.4 1.4L21.4 13z"/></svg><div class="name">выход</div></div>
  </div>
</body>
</html>
