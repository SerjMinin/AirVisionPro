<!DOCTYPE html>
<!-- ↑ Говорит браузеру: это современный HTML5-документ -->

<html lang="ru">
<!-- ↑ Корень страницы. lang="ru" — основной язык русский (для поисковиков и озвучки) -->

<head>
<!-- ↑ "Голова" страницы: служебная информация, которую пользователь не видит напрямую -->

  <meta charset="UTF-8">
  <!-- ↑ Кодировка UTF-8 — чтобы русские буквы отображались правильно, без "кракозябр" -->

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- ↑ Адаптация под экран телефона: ширина = ширине устройства, масштаб 100% -->

  <title>AirVision Pro</title>
  <!-- ↑ Текст во вкладке браузера -->

</head>

<body>
<!-- ↑ "Тело" страницы: всё, что видит пользователь -->

  <h1>AirVision Pro</h1>
  <!-- ↑ Главный заголовок страницы (h1 — самый крупный) -->

  <p>Сайт работает! 🎉 Это временная страница-заглушка.</p>
  <!-- ↑ Обычный абзац текста (p = paragraph) -->

</body>
</html>
<!-- ↑ Закрываем тело и корень документа -->
