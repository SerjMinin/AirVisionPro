<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirVision Pro — Вход</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #0a2540 0%, #050a14 55%, #02040a 100%);
      overflow: hidden;
    }

    .glow {
      position: absolute;
      width: 520px; height: 520px;
      background: radial-gradient(circle, rgba(41,155,255,0.35) 0%, rgba(41,155,255,0) 70%);
      filter: blur(20px);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      width: 340px;
      padding: 44px 36px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(120, 190, 255, 0.25);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: 0 0 40px rgba(41,155,255,0.25), inset 0 0 25px rgba(41,155,255,0.08);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
    }

    .title {
      font-size: 30px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background: linear-gradient(90deg, #4db2ff, #2e8fff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 18px rgba(41,155,255,0.4);
      margin-bottom: 6px;
    }

    .field {
      width: 100%;
      padding: 14px 20px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(120, 190, 255, 0.35);
      color: #eaf4ff;
      font-family: 'Exo 2', sans-serif;
      font-size: 15px;
      outline: none;
      transition: 0.25s;
    }
    .field::placeholder { color: rgba(200, 225, 255, 0.5); }
    .field:focus {
      border-color: #4db2ff;
      box-shadow: 0 0 14px rgba(77,178,255,0.5);
      background: rgba(255, 255, 255, 0.06);
    }

    .btn {
      margin-top: 6px;
      padding: 14px 52px;
      border-radius: 999px;
      background: rgba(41, 155, 255, 0.12);
      border: 1px solid rgba(120, 190, 255, 0.45);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 0 18px rgba(41,155,255,0.35), inset 0 0 12px rgba(41,155,255,0.1);

      font-family: 'Exo 2', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      background-clip: padding-box;
    }
    .btn span {
      background: linear-gradient(90deg, #4db2ff, #2e8fff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 14px rgba(41,155,255,0.4);
    }
    .btn:hover {
      transform: translateY(-1px);
      border-color: #4db2ff;
      box-shadow: 0 0 28px rgba(41,155,255,0.6), inset 0 0 16px rgba(41,155,255,0.15);
    }
    .btn:active { transform: translateY(0); }

    .error {
      color: #ff8080;
      font-size: 13px;
      min-height: 16px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="card">
    <div class="title">AirVision Pro</div>

    <input type="email" id="email" class="field" placeholder="Email" autocomplete="username" />
    <input type="password" id="password" class="field" placeholder="Пароль" autocomplete="current-password" />

    <div class="error" id="error"></div>

    <button class="btn" onclick="login()"><span>Войти</span></button>
  </div>

  <script>
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error");
      errorBox.textContent = "";

      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) { errorBox.textContent = "Неверный email или пароль"; return; }
      window.location.href = "dashboard.html";
    }

    document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  </script>
</body>
</html>
