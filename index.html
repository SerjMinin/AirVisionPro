<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirVision Pro — Вход</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="i18n.js"></script>
</head>
<body class="page-login">
  <div class="glow"></div>

  <div class="lang-switch">
    <button class="icon-btn" id="lang-btn" title="Язык / Language">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="9"/><ellipse cx="12" cy="12" rx="4" ry="9"/>
        <line x1="3" y1="12" x2="21" y2="12"/><path d="M4.5 7.5h15M4.5 16.5h15"/>
      </svg>
    </button>
    <div class="lang-menu" id="lang-menu"></div>
  </div>

  <div class="card">
    <div class="title" data-i18n="login_title">AirVision Pro</div>

    <input type="email" id="email" class="field" data-i18n-ph="email" autocomplete="username" />
    <input type="password" id="password" class="field" data-i18n-ph="password" autocomplete="current-password" />

    <div class="error" id="error"></div>

    <button class="btn" onclick="login()"><span data-i18n="enter">Войти</span></button>
  </div>

  <script>
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const errorBox = document.getElementById("error");
      errorBox.textContent = "";
      const { error } = await client.auth.signInWithPassword({ email, password });
      if (error) { errorBox.textContent = t("err_login"); return; }
      window.location.href = "dashboard.html";
    }
    document.addEventListener("keydown", e => { if (e.key === "Enter") login(); });
  </script>
</body>
</html>
