<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AirVision Pro</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="config.js"></script>
  <script src="i18n.js"></script>

  <!-- скрываем страницу до проверки входа -->
  <style>body { visibility: hidden; }</style>
</head>
<body class="page-dash">

  <!-- ШАПКА -->
  <header class="topbar">
    <div class="brand">AirVision Pro</div>

    <div class="status-group">
      <div class="status-item"><span class="dot" id="dot-in"></span><span data-i18n="indoor">Дом</span>: <span id="sn-in">IN-0001</span></div>
      <div class="status-item"><span class="dot" id="dot-out"></span><span data-i18n="outdoor">Улица</span>: <span id="sn-out">OUT-0001</span></div>
      <div class="status-item"><span class="dot" id="dot-wifi"></span><span data-i18n="wifi">WiFi</span></div>
    </div>

    <div class="spacer"></div>
    <div class="ver" id="ver">Версия v1.0</div>

    <div class="top-actions">
      <button class="icon-btn" onclick="toggleTheme()" title="Тема">🌓</button>
      <button class="icon-btn" id="lang-btn" title="Язык / Language">🌐</button>
      <div class="lang-menu" id="lang-menu"></div>
      <button class="icon-btn" title="Настройки">⚙</button>
      <button class="icon-btn" onclick="logout()" title="Выйти">⎋</button>
    </div>
  </header>

  <!-- ОБЛАСТЬ ГРАФИКА -->
  <main class="chart-area">
    <div class="chart-head">
      <div class="chart-title" id="chart-title">Температура</div>
    </div>
    <div class="chart-box">
      <canvas id="chart"></canvas>
    </div>
  </main>

  <!-- УМНЫЕ СОВЕТЫ -->
  <div class="advice" id="advice" data-i18n="advice_default">Советы появятся по мере поступления данных.</div>

  <!-- ВКЛАДКИ-ЛИСТЫ -->
  <nav class="tabs" id="tabs"></nav>

  <script src="app.js"></script>
  <script>startDashboard();</script>
</body>
</html>
