<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AirVision Pro — Кабинет</title>

  <style>
    /* ↓ Базовое оформление кабинета */
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      visibility: hidden;   /* прячем страницу, пока не проверим вход */
    }
    /* Верхняя панель (шапка) */
    header {
      background: #2563eb;              /* синяя шапка */
      color: #fff;                     /* белый текст */
      padding: 16px 24px;
      display: flex;                   /* элементы в ряд */
      justify-content: space-between;  /* заголовок слева, кнопка справа */
      align-items: center;             /* по центру по вертикали */
    }
    header h1 { margin: 0; font-size: 20px; }
    /* Кнопка "Выйти" в шапке */
    .logout {
      background: #fff;
      color: #2563eb;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    .logout:hover { background: #e0e7ff; }
    /* Основная область под шапкой */
    main { padding: 24px; }
    .box {
      background: #fff;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    /* Ряд карточек со значениями */
    .cards {
      display: flex;          /* карточки в ряд */
      gap: 16px;              /* промежуток между ними */
      margin-top: 24px;       /* отступ сверху */
      flex-wrap: wrap;        /* переносить на телефоне */
    }
    .card-value {
      background: #fff;
      padding: 20px 28px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      min-width: 120px;
    }
    .card-value .label { color: #666; font-size: 14px; }        /* подпись */
    .card-value .value { font-size: 34px; font-weight: bold; }  /* число */
    .card-value .unit  { color: #999; font-size: 13px; }        /* единица */
  </style>
</head>

<body>
  <!-- Шапка: название + кнопка выхода -->
  <header>
    <h1>AirVision Pro</h1>
    <!-- При клике вызовется функция logout() (описана ниже) -->
    <button class="logout" onclick="logout()">Выйти</button>
  </header>

 <!-- Основное содержимое кабинета -->
  <main>
    <div class="box">
      <!-- Сюда скрипт подставит email вошедшего пользователя -->
      <h2 id="greeting">Загрузка...</h2>
      <p>Это ваш личный кабинет. Скоро здесь появятся данные и графики. 📊</p>
     </div>

     <!-- Контейнер для карточек с текущими значениями -->
     <div class="cards">
      <!-- Карточка температуры -->
      <div class="card-value">
        <div class="label">Температура</div>
        <div class="value" id="val-temp">—</div>
        <div class="unit">°C</div>
      </div>
      <!-- Карточка влажности -->
      <div class="card-value">
        <div class="label">Влажность</div>
        <div class="value" id="val-rh">—</div>
        <div class="unit">%</div>
      </div>
    </div>

  </main>

  <!-- Подключаем библиотеку Supabase и наш config.js -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <script>
    // Создаём клиент Supabase (как на странице входа)
    const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Функция-"охранник": проверяет, вошёл ли пользователь.
    // Запускается СРАЗУ при открытии страницы.
    async function checkAuth() {
      // Спрашиваем Supabase: есть ли действующая сессия?
      const { data } = await client.auth.getSession();

      // Нет сессии → сразу редирект, страницу так и НЕ показываем:
      if (!data.session) {
        // Нет сессии → отправляем обратно на страницу входа:
        window.location.href = "index.html";
        return; // дальше код не выполняем
      }

      // Сессия есть → пользователь вошёл.
      // Берём его email и показываем приветствие:
      const email = data.session.user.email;
      document.getElementById("greeting").textContent = "Здравствуйте, " + email;
      // Проверка пройдена — делаем страницу видимой:
      document.body.style.visibility = "visible";
      // Загружаем текущие значения датчиков:
      loadLatest();
    }

    // Функция выхода:
    async function logout() {
      await client.auth.signOut();          // завершаем сессию в Supabase
      window.location.href = "index.html";  // возвращаемся на страницу входа
    }

    // Загружает последнее значение одного параметра (key) и пишет его в элемент elementId.
    async function loadOne(key, elementId) {
      // Запрашиваем из таблицы measurements:
      const { data, error } = await client
        .from("measurements")             // из таблицы measurements
        .select("val, ts_device")         // берём значение и время
        .eq("serial", "OUT-0001")         // только уличное устройство
        .eq("key", key)                   // только нужный параметр (temp/rh)
        .order("ts_device", { ascending: false }) // новые сверху
        .limit(1);                        // берём одну самую свежую строку

      // Если ошибка или пусто — оставляем прочерк:
      if (error || !data || data.length === 0) {
        console.log("Нет данных для", key, error);
        return;
      }

      // Берём значение из первой (единственной) строки и показываем:
      const value = data[0].val;
      document.getElementById(elementId).textContent = value;
    }

    // Загружает все нужные текущие значения:
    async function loadLatest() {
      loadOne("temp", "val-temp");   // температура → в карточку val-temp
      loadOne("rh", "val-rh");       // влажность → в карточку val-rh
    }

    // Запускаем проверку сразу при загрузке страницы:
    checkAuth();
  </script>
</body>
</html>
